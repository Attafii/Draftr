name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      publish_bundle_analyzer:
        description: Publish the Next.js bundle analyzer artifact
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: "1"
  NEXT_PUBLIC_SITE_URL: http://127.0.0.1:4321
  NEXT_PUBLIC_NVIDIA_MODEL: test-model
  NVIDIA_MODEL: test-model
  NVIDIA_API_KEY: ""

jobs:
  verify:
    name: Build, test, and e2e
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Run unit tests
        run: npm test

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser E2E tests
        run: npm run e2e

  analyze:
    name: Bundle analyzer
    if: github.event_name == 'workflow_dispatch' && inputs.publish_bundle_analyzer
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with bundle analyzer
        run: npm run analyze

      - name: Upload bundle analyzer artifact
        uses: actions/upload-artifact@v4
        with:
          name: bundle-analyzer-report
          path: .next/analyze
          if-no-files-found: error
          retention-days: 7